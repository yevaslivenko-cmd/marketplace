<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Маркетплейс</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Добро пожаловать на наш маркетплейс!</h1>
        <nav>
            <ul>
                <li><a href="#">Главная</a></li>
                <li><a href="#">Товары</a></li>
                <li><a href="#">Корзина</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="products">
            <div class="product">
                <img src="img/tovar1.png" alt="Товар 1">
                <h2>Товар 1</h2>
                <p>Цена: 1000 руб.</p>
                <button>Добавить в корзину</button>
            </div>
            <div class="product">
                <img src="img/tovar2.png" alt="Товар 2">
                <h2>Товар 2</h2>
                <p>Цена: 1500 руб.</p>
                <button>Добавить в корзину</button>
            </div>
        </section>
    </main>
    <footer>
        <p>© 2026 Мой Маркетплейс</p>
    </footer>
</body>
</html>
